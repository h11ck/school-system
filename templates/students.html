<!DOCTYPE html>
<html>
<head>
    <title>{{ t.student_management }}</title>
</head>
<body>

<h1>{{ t.student_management }}</h1>

<form method="POST">
    <input type="text" name="name" placeholder="{{ t.student_name }}" required>
    <button type="submit">{{ t.add }}</button>
</form>

<h2>{{ t.student_list }}</h2>

<ul>
    {% for student in students %}
        <li>{{ student[1] }}</li>
    {% endfor %}
</ul>

<a href="/">{{ t.back }}</a>

</body>
</html>
