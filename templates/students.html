<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h1>{{ t.students }}</h1>

<form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Student name"
        required
    >

    <select name="class_id" required>

        <option value="">
            Select class
        </option>

        {% for class_item in classes %}
            <option value="{{ class_item.id }}">
                {{ class_item.name }}
            </option>
        {% endfor %}

    </select>

    <button type="submit">
        Add
    </button>

</form>

<hr>

<ul>
    {% for student in students %}

        <li>
            {{ student.name }}
        </li>

    {% endfor %}
</ul>

<br>

<a href="/">
    Back
</a>

</body>
</html>
